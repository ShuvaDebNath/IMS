<!-- pending-rm-requisition-production-edit.component.html -->
<div class="m-2 p-2 shadow-sm">
  <div class="card">
    <div class="card-header theme-bg">
      <h1>Edit Pending RM Requisition</h1>
    </div>
    <div class="card-body">
      <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
        <div class="row mb-1">
          <div class="col-md-4">
            <div class="row g-1 align-items-start">
              <div class="col-4">
                <label class="form-label" for="RequisitionNumber"
                  >Requisition Number</label
                >
              </div>
              <div class="col-8">
                <input
                  id="RequisitionNumber"
                  class="form-control"
                  type="text"
                  formControlName="RequisitionNumber"
                  readonly
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row mb-1">
          <div class="col-md-4">
            <div class="row g-1 align-items-start">
              <div class="col-4">
                <label class="form-label" for="RequisitionDate"
                  >Requisition Date</label
                >
              </div>
              <div class="col-8">
                <p-calendar
                  formControlName="RequisitionDate"
                  [showIcon]="false"
                  dateFormat="dd/mm/yy"
                  placeholder="Select Date"
                  inputStyleClass="custom-date-input"
                  appendTo="body"
                  [style]="{ width: '100%' }"
                ></p-calendar>
              </div>
            </div>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-4">
            <div class="row g-1 align-items-start">
              <div class="col-4">
                <label class="form-label" for="RequisitionDate"
                  >Requisition Date</label
                >
              </div>
              <div class="col-8">
                   <textarea
              id="Remarks"
              class="form-control"
              formControlName="Remarks"
            ></textarea>
              </div>
            </div>
          </div>
        </div>

          <div class="col-md-4">
            <label class="form-label" for="Remarks">Remarks</label>
            <input
              id="RequisitionNumber"
              class="form-control"
              type="text"
              formControlName="RequisitionNumber"
              readonly
            />
          </div>

          <div class="col-md-4">
            <label class="form-label" for="RequisitionDate"
              >Requisition Date</label
            >
            <input
              id="RequisitionDate"
              class="form-control"
              type="date"
              formControlName="RequisitionDate"
            />
          </div>

          <div class="col-md-4">

            <textarea
              id="Remarks"
              class="form-control"
              formControlName="Remarks"
            ></textarea>
          </div>
        </div> -->

        <table class="table table-sm table-bordered align-middle">
          <thead class="table-light">
            <tr class="custom-header">
              <th style="width: 40%; text-align: center">Article</th>
              <th style="width: 30%; text-align: center">Description</th>
              <th style="width: 10%; text-align: center">Quantity</th>
              <th style="width: 10%; text-align: center">Roll/Bag</th>
              <th style="width: 10%; text-align: center">R/B Qty</th>
              <th style="width: 10%; text-align: center">Action</th>
            </tr>
          </thead>

          <tbody formArrayName="Items">
            <tr
              *ngFor="let fg of items.controls; let i = index"
              [formGroupName]="i"
            >
              <td>
                <p-dropdown
                  class="p-0 rm-dd"
                  [style]="{ width: '100%' }"
                  [panelStyle]="{ width: '100%' }"
                  [options]="rawMaterialArticles"
                  optionLabel="ConcatArticleNo"
                  optionValue="RawMaterial_ID"
                  [filter]="true"
                  filterBy="ConcatArticleNo"
                  [showClear]="true"
                  placeholder="Please Select"
                  (onChange)="onArticleChange(i, $event.value)"
                  formControlName="RawMaterial_ID"
                >
                  <ng-template let-article pTemplate="item">
                    <div class="flex align-items-center gap-2">
                      <div>{{ article.ConcatArticleNo }}</div>
                    </div>
                  </ng-template>
                </p-dropdown>
              </td>
              <td>
                <input class="form-control" formControlName="Description" />
              </td>
              <td>
                <input
                  class="form-control"
                  style="text-align: center"
                  type="number"
                  min="0"
                  formControlName="Quantity"
                />
              </td>
              <td>
                <select
                  class="form-select text-center"
                  formControlName="Roll_Bag"
                >
                  <option
                    *ngFor="let opt of rollOrBagOptions"
                    [value]="opt.value"
                  >
                    {{ opt.label }}
                  </option>
                </select>
              </td>

              <td>
                <input
                  class="form-control"
                  style="text-align: center"
                  type="number"
                  min="0"
                  formControlName="RollBag_Quantity"
                />
              </td>

              <td>
                <button
                  type="button"
                  class="btn btn-sm btn-danger"
                  (click)="removeItem(i)"
                >
                  ×
                </button>
              </td>
            </tr>
          </tbody>

          <tr class="totals-row">
            <td></td>
            <td class="text-end fw-bold">Totals:</td>
            <td>
              <input
                class="form-control text-center"
                formControlName="Total_Qty"
                readonly
              />
            </td>
            <td>
              <div class="rbq-label">Rolls</div>
              <div class="rbq-label">Bags</div>
            </td>
            <td colspan="2" class="rbq-total-cell">
              <div class="rbq-grid">
                <input
                  class="form-control text-end"
                  formControlName="Total_Roll"
                  readonly
                /><br />
                <input
                  class="form-control text-end"
                  formControlName="Total_bag"
                  readonly
                />
              </div>
            </td>
          </tr>
        </table>
        <div class="d-flex justify-content-end gap-2 mt-3">
          <button
            type="button"
            class="btn btn-outline-success btn-rounded"
            (click)="addItem()"
            style="width: 130px"
          >
            <i class="bi bi-plus-circle me-1"></i> Add Row
          </button>

          <button
            type="submit"
            class="btn theme-btn btn-rounded"
            [disabled]="editForm.invalid"
            style="width: 130px"
          >
            <i class="bi bi-save me-1"></i> Save
          </button>
        </div>

        <!-- <button type="submit" class="btn btn-primary">Save</button> -->
      </form>
    </div>
  </div>
</div>
