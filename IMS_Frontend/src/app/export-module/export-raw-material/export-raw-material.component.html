      <h1 class="fw-normal">Export Raw Material Form</h1>
    </div>
    <div class="card-body">

        <div class="row g-6 border-bottom pb-2">
          <div class="col-md-6">
            <div class="row align-items-center mb-3">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label class="form-label">Export Date <span>*</span></label>
              </div>
              <div class="col-md-8">
                <p-calendar
                  formControlName="ExportDate"
                  [showIcon]="false"
                  dateFormat="dd/mm/yy"
                  placeholder="Select Date"
                  class="w-100"
                  [style]="{ width: '70%' }"
                  inputStyleClass="form-control custom-date-input"
                ></p-calendar>
              </div>
            </div>

            <!-- PIs -->
            <div class="row align-items-center">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label class="form-label">Invoice No <span>*</span></label>
              </div>
              <div class="col-md-8">
                <input
                  autocomplete="off"
                  type="text"
                  formControlName="ExportNo"
                  class="form-control"
                  placeholder="Invoice No"
                  id="invoiceNo"
                  name="invoiceNo"
                  value=""
                  style="width:70%;height: 48px;"
                />
              </div>
            </div>
            <div class="row align-items-center mt-3">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label class="form-label">Shipping Information</label>
              </div>
              <div class="col-md-8">
                <div class="col-md-8">
                  <textarea
                    class="form-control"
                    formControlName="ShippingInformation"
                    rows="2"
                      style="width:100%"
                  ></textarea>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="row align-items-center mb-3">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label>Loading Port <span>*</span></label>
              </div>
              <div class="col-md-8">
                <p-dropdown
                  [style]="{ width: '70%' }"
                  class="p-0"
                  [options]="LoadingPortList"
                  optionLabel="Loading_Port_Name"
                  [filter]="true"
                  filterBy="Loading_Port_Name"
                  [showClear]="true"
                  styleClass="listBottom"
                  placeholder="Please Select"
                  optionValue="Loading_Port_ID"
                  formControlName="Loading_Port"
                >
                  <ng-template let-AB pTemplate="item">
                    <div class="flex align-items-center gap-2">
                      <div>{{ AB.Loading_Port_Name }}</div>
                    </div>
                  </ng-template>
                </p-dropdown>
              </div>
            </div>

            <div class="row align-items-center">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label>Destination Port <span>*</span></label>
              </div>
              <div class="col-md-8">
                <p-dropdown
                  [style]="{ width: '70%' }"
                  class="p-0"
                  [options]="DestinationPortList"
                  optionLabel="Destination_Port_Name"
                  [filter]="true"
                  filterBy="Destination_Port_Name"
                  [showClear]="true"
                  styleClass="listBottom"
                  placeholder="Please Select"
                  optionValue="Destination_Port_ID"
                  formControlName="Destination_Port"
                  panelStyleClass="my-dropdown-panel"
                >
                  <ng-template let-AB pTemplate="item">
                    <div class="flex align-items-center gap-2">
                      <div>{{ AB.Destination_Port_Name }}</div>
                    </div>
                  </ng-template>
                </p-dropdown>
              </div>
            </div>
            <div class="row align-items-center mt-3">
              <div class="col-md-4 text-end fs-6 fw-bold">
                <label class="form-label">Remarks</label>
              </div>
              <div class="col-md-8">
                <div class="col-md-8">
                  <textarea
                    class="form-control"
                    formControlName="remarks"
                    rows="2"
                      style="width:100%"
                  ></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        <h3><strong>Details </strong></h3>
        <!-- Items table -->
        <table class="table table-bordered">
          <thead>
            <tr class="custom-header">
              <th class="th-article" style="text-align: center">
                <span>Article</span>

                <!-- PrimeIcons version (PrimeNG) -->
                <button
                  type="button"
                  class="icon-btn"
                  [disabled]="reloadingArticles"
                  (click)="refreshArticles()"
                  title="Refresh articles"
                >
                  <i
                    class="pi"
                    [ngClass]="
                      reloadingArticles ? 'pi-spinner pi-spin' : 'pi-refresh'
                    "
                  ></i>
                </button>
              </th>
              <th style="text-align: center">Description</th>
              <th style="text-align: center">Color</th>
              <th style="text-align: center">Width</th>
              <th style="text-align: center">Roll/Bag</th>
              <th style="text-align: center">Roll/Bag Qty</th>
              <th style="text-align: center">Unit</th>
              <th style="text-align: center">Qty</th>
              <th style="text-align: center">Weight</th>
              <th style="text-align: center">Gross Weight</th>
              <th style="width: 60px"></th>
            </tr>
          </thead>

          <tbody formArrayName="items">
            <tr
              *ngFor="let item of items.controls; let i = index"
              [formGroupName]="i"
            >
              <td>
                <div class="form-group">
                  <p-dropdown
                    class="p-0 rm-dd"
                    [style]="{ width: '100px !important' }"
                    [panelStyle]="{ width: '100%' }"
                    [options]="RawMaterialList"
                    (onChange)="RMOptionChange(item)"
                    optionLabel="Article_No"
                    optionValue="RawMaterial_ID"
                    [filter]="true"
                    filterBy="Article_No"
                    [showClear]="true"
                    placeholder="Please Select"
                    panelStyleClass="my-dropdown-panel"
                    formControlName="article"
                  >
                    <ng-template let-article pTemplate="item">
                      <div class="flex align-items-center gap-2">
                        <div>{{ article.Article_No }}</div>
                      </div>
                    </ng-template>
                  </p-dropdown>
                </div>
              </td>

              <td class="col-description">
                <input
                  class="form-control"
                  [style]="{ width: '100px !important' }"
                  formControlName="description"
                   style="height: 48px;"
                />
              </td>
              <td>
                <div class="form-group">
                  <p-dropdown
                    class="p-0 rm-dd"
                    [options]="ColorList"
                    optionLabel="Color"
                    optionValue="Color_ID"
                    [filter]="true"
                    filterBy="Color"
                    [showClear]="true"
                    placeholder="Please Select"
                    formControlName="color"
                    [readonly]="true"
                    panelStyleClass="my-dropdown-panel"
                  >
                    <ng-template let-color pTemplate="item">
                      <div class="flex align-items-center gap-2">
                        <div>{{ color.Color }}</div>
                      </div>
                    </ng-template>
                  </p-dropdown>
                </div>
              </td>
              <td>
                <div class="form-group">
                  <p-dropdown
                    class="p-0 rm-dd"
                    [style]="{ width: '100px !important' }"
                    [panelStyle]="{ width: '100%' }"
                    [options]="WidthList"
                    optionLabel="Measurement"
                    optionValue="Width_ID"
                    [filter]="true"
                    filterBy="Measurement"
                    [showClear]="true"
                    placeholder="Please Select"
                    formControlName="width"
                    [readonly]="true"
                    panelStyleClass="my-dropdown-panel"
                  >
                    <ng-template let-width pTemplate="item">
                      <div class="flex align-items-center gap-2">
                        <div>{{ width.Measurement }}</div>
                      </div>
                    </ng-template>
                  </p-dropdown>
                </div>
              </td>
              <td>
                <select
                  class="form-control"
                  [style]="{ width: '100px !important' }"
                  formControlName="rollOrBag"
                   style="height: 48px;"
                >
                  <option value="roll">Rolls</option>
                  <option value="bag">Bags</option>
                </select>
              </td>
              <td>
                <input
                  type="number"
                  class="form-control"
                  [style]="{ width: '80px !important' }"
                  formControlName="rollBagQty"
                  style="text-align: center;height:48px"

                />
              </td>

              <td>
                <div class="form-group">
                  <p-dropdown
                    class="p-0 rm-dd"
                    [style]="{ width: '100px !important' }"
                    [panelStyle]="{ width: '100%' }"
                    [options]="UnitList"
                    optionLabel="Unit"
                    optionValue="Unit_ID"
                    [filter]="true"
                    filterBy="Unit"
                    [showClear]="true"
                    placeholder="Please Select"
                    formControlName="unitId"
                    [readonly]="true"
                    panelStyleClass="my-dropdown-panel"
                  >
                    <ng-template let-Unit pTemplate="item">
                      <div class="flex align-items-center gap-2">
                        <div>{{ Unit.Unit }}</div>
                      </div>
                    </ng-template>
                  </p-dropdown>
                </div>
              </td>
              <td>
                <input
                  type="number"
                  [style]="{ width: '100% !important' }"
                  class="form-control"
                  formControlName="qty"
                  style="text-align: center;height: 48px;"
                />
              </td>
              <td>
                <input
                  type="number"
                  [style]="{ width: '100% !important' }"
                  class="form-control"
                  formControlName="weight"
                  style="text-align: center;height: 48px;"
                />
              </td>
              <td>
                <input
                  type="number"
                  [style]="{ width: '100% !important' }"
                  class="form-control"
                  formControlName="grossWeight"
                  style="text-align: center;height: 48px;"
                  readonly
                />
              </td>

              <td>
                <button
                  type="button"
                  class="btn btn-sm btn-danger"
                  (click)="removeItem(i)"
                   style="height: 48px; width: 60px;font-size: 16px;"
                >
                  ×
                </button>
              </td>
            </tr>
          </tbody>

          <tr class="totals-row">
            <td></td>
            <td class="text-end fw-bold">Totals:</td>
            <td></td>
            <td></td>
            <td>
              <div class="rbq-label">Rolls</div>
              <div class="rbq-label">Bags</div>
            </td>
            <td colspan="2" class="rbq-total-cell">
              <div class="rbq-grid">
                <input
                  class="form-control text-end"
                  [value]="totalRoll"
                  disabled
                /><br />
                <input
                  class="form-control text-end"
                  [value]="totalBag"
                  disabled
                />
              </div>
            </td>
            <td>
              <input
                class="form-control text-end"
                [value]="totalQty"
                disabled
              />
            </td>
            <td></td>
            <td>
              <input
                class="form-control text-end"
                [value]="totalGross"
                disabled
              />
            </td>
          </tr>
        </table>

        <div class="d-flex justify-content-end gap-2 mt-3">
          <button
            type="button"
            class="btn btn-outline-success"
            (click)="addItem()"
            style="height: 38px; width: 130px"
          >
            <i class="bi bi-plus-circle me-1"></i> Add Row
          </button>

          <button
            type="submit"
            (click)="saveData()"
            [ngClass]="{
              'theme-btn-disable': exportForm.invalid,
            }"
            class="btn theme-btn btn-rounded"
            *ngIf="!isEdit"
            [disabled]="exportForm.invalid"
            style="height: 38px; width: 130px"
          >
            <i class="bi bi-save me-1"></i> Save
          </button>
          <button
            type="submit"
            (click)="UpdateData()"
            [ngClass]="{
              'theme-btn-disable': exportForm.invalid,
            }"
            class="btn theme-btn btn-rounded"
            [disabled]="exportForm.invalid"
            *ngIf="isEdit"
            style="height: 38px; width: 130px"
          >
            <i class="bi bi-save me-1"></i> Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
